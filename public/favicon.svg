<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000">
  <!-- Left half: grey house (before) -->
  <defs>
    <clipPath id="left-half"><rect x="0" y="0" width="500" height="1000"/></clipPath>
    <clipPath id="right-half"><rect x="500" y="0" width="500" height="1000"/></clipPath>
  </defs>

  <!-- Grey house (left side) -->
  <g clip-path="url(#left-half)">
    <!-- Roof -->
    <path d="M500 120 L120 450 L180 450 L500 180 L820 450 L880 450 Z" fill="#b4b4b4"/>
    <!-- Body -->
    <path d="M200 440 L200 850 L420 850 L420 620 L580 620 L580 850 L800 850 L800 440 L500 190 Z" fill="#b4b4b4"/>
    <!-- Door cutout (white) -->
    <rect x="420" y="620" width="160" height="230" fill="white"/>
  </g>

  <!-- Blue house (right side) -->
  <g clip-path="url(#right-half)">
    <!-- Roof -->
    <path d="M500 120 L120 450 L180 450 L500 180 L820 450 L880 450 Z" fill="#0560e8"/>
    <!-- Chimney -->
    <rect x="680" y="200" width="70" height="180" fill="#0560e8"/>
    <!-- Body -->
    <path d="M200 440 L200 850 L420 850 L420 620 L580 620 L580 850 L800 850 L800 440 L500 190 Z" fill="#0560e8"/>
    <!-- Door cutout (white) -->
    <rect x="420" y="620" width="160" height="230" fill="white"/>
  </g>

  <!-- Center divider line -->
  <line x1="500" y1="60" x2="500" y2="940" stroke="black" stroke-width="16" stroke-linecap="round"/>
</svg>
