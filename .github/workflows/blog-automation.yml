name: Blog automation

on:
  # Run 3x/week: Monday, Wednesday, Friday at 6:00 UTC (7:00 CET)
  schedule:
    - cron: "0 6 * * 1,3,5"
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      topic:
        description: "Topic hint for the blog post (optional, leave empty for auto)"
        required: false
        type: string

permissions:
  contents: write

env:
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

jobs:
  generate-post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate blog post
        run: node scripts/generate-blog-post.mjs "${{ github.event.inputs.topic || '' }}"

      - name: Update sitemap with new post
        run: node scripts/update-sitemap.mjs

      - name: Check for new content
        id: check
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            # Extract the new post slug for IndexNow
            SLUG=$(ls -t src/content/blog/*.json | head -1 | xargs -I{} node -e "console.log(JSON.parse(require('fs').readFileSync('{}','utf8')).slug)")
            echo "slug=$SLUG" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/blog/ public/sitemap.xml
          git commit -m "blog: add new post — ${{ steps.check.outputs.slug }}"
          git pull --rebase origin main
          git push origin main

      - name: Ping IndexNow (Bing, Seznam, Yandex)
        if: steps.check.outputs.changed == 'true'
        run: |
          node scripts/ping-indexnow.mjs \
            "https://realfoto.sk/blog/${{ steps.check.outputs.slug }}" \
            "https://realfoto.sk/blog" \
            "https://realfoto.sk/sitemap.xml"

      - name: Ping Google sitemap
        if: steps.check.outputs.changed == 'true'
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://realfoto.sk/sitemap.xml"
          echo ""
          echo "✓ Google sitemap ping sent"
