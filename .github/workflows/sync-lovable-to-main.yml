name: Sync lovable → main

on:
  push:
    branches:
      - lovable

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for new Lovable commits
        id: check
        run: |
          git fetch origin
          DIFF=$(git log origin/main..origin/lovable --oneline)
          if [ -z "$DIFF" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Create or update PR
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --head lovable --base main --json number -q '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists — Lovable pushed new commits to it"
          else
            gh pr create \
              --head lovable \
              --base main \
              --title "Lovable: $(git log origin/lovable -1 --format='%s')" \
              --body "Auto-created from Lovable push. **Review before merging** to make sure it doesn't revert local work."
          fi
