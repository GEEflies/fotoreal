name: Auto-merge lovable → main

on:
  push:
    branches:
      - lovable

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge lovable into main
        run: |
          git fetch origin lovable
          git merge origin/lovable --no-edit -m "Auto-merge: lovable → main"

      - name: Push to main
        run: git push origin main
